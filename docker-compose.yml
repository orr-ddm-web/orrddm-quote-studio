version: '3.8'
services:
  app:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - quote_data:/app/backend/data
      - quote_uploads:/app/backend/uploads
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped

volumes:
  quote_data:
  quote_uploads:
